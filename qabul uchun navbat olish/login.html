<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga Kirish</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏥 Klinika Tizimi</h1>
            <p>Tizimga kirish</p>
        </div>
        
        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('admin')">Admin</button>
            <button class="tab-btn" onclick="switchTab('doctor')">Shifokor</button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <!-- Admin Login Form -->
        <form id="adminLoginForm" class="login-form active">
            <div class="form-group">
                <label>📧 Email:</label>
                <input type="email" id="adminEmail" placeholder="admin@klinika.uz" required>
            </div>
            <div class="form-group">
                <label>🔒 Parol:</label>
                <input type="password" id="adminPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Kirish</button>
        </form>
        
        <!-- Doctor Login Form -->
        <form id="doctorLoginForm" class="login-form">
            <div class="form-group">
                <label>📧 Email:</label>
                <input type="email" id="doctorEmail" placeholder="doctor@klinika.uz" required>
            </div>
            <div class="form-group">
                <label>🔒 Parol:</label>
                <input type="password" id="doctorPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Kirish</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #667eea; text-decoration: none;">← Bosh sahifaga qaytish</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script type="module">
        import authManager from './js/auth.js';
        
        let currentTab = 'admin';
        
        window.switchTab = function(tab) {
            currentTab = tab;
            
            // Tab tugmalarini yangilash
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Formalarni yangilash
            document.querySelectorAll('.login-form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(tab + 'LoginForm').classList.add('active');
            
            // Xabarlarni yashirish
            hideMessages();
        };
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        // Admin login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            const result = await authManager.login(email, password);
            
            if (result.success && result.role === 'admin') {
                showSuccess('Muvaffaqiyatli kirildi! Yo\'naltirilmoqda...');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showError(result.error || 'Admin huquqi yo\'q!');
            }
        });
        
        // Doctor login
        document.getElementById('doctorLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('doctorEmail').value;
            const password = document.getElementById('doctorPassword').value;
            
            const result = await authManager.login(email, password);
            
            if (result.success && result.role === 'doctor') {
                showSuccess('Muvaffaqiyatli kirildi! Yo\'naltirilmoqda...');
                setTimeout(() => {
                    window.location.href = 'doctor-panel.html';
                }, 1000);
            } else {
                showError(result.error || 'Shifokor huquqi yo\'q!');
            }
        });
    </script>
</body>
</html>
